                {title:"Forex Trading Dashboard", desc:"Real-time Trading Platform", img:projectImages[1], detail:"Dashboard ya kufuatilia bei, alerts na uchambuzi.", searchTerms:"forex trading dashboard platform"},
                {title:"School Management System", desc:"Student & Exam Management", img:projectImages[2], detail:"Mfumo wa usimamizi wa shule, usajili, matokeo.", searchTerms:"school management student exam"},
                {title:"E-commerce Website", desc:"Modern Online Store", img:projectImages[3], detail:"Duka la mtandaoni lenye mfumo wa malipo salama.", searchTerms:"ecommerce website online store"},
                {title:"Company Branding Package", desc:"Logo, Banners & Stationery", img:projectImages[4], detail:"Branding kamili - logo, kadi, mabango.", searchTerms:"branding logo banners"},
                {title:"Personal Portfolio", desc:"Responsive Portfolio Website", img:projectImages[5], detail:"Portfolio ya kisasa, dark mode, lugha mbili.", searchTerms:"portfolio personal website"}
            ];
            educationData = [
                { title: "Bachelor in Business Information Systems", institution: "UDOM", year: "2019-2022", details: "System Analysis, Web Dev, Database Design", searchTerms: "bachelor degree business information systems" },
                { title: "Full Stack Web Development", institution: "Moringa School", searchTerms: "full stack web development" },
                { title: "Forex Trading Advanced", institution: "Forex Academy", searchTerms: "forex trading advanced" },
                { title: "Graphics Design Masterclass", institution: "Udemy", searchTerms: "graphics design masterclass" }
            ];
        }
        
        function performGlobalSearch() {
            if(!searchQuery || searchQuery.trim() === '') {
                if(currentSection === 'dashboard') renderDashboard();
                else if(currentSection === 'skills') renderSkillsPage();
                else if(currentSection === 'projects') renderProjectsPage();
                else if(currentSection === 'education') renderEducationPage();
                else if(currentSection === 'about') renderAbout();
                else if(currentSection === 'contact') renderContact();
                return;
            }
            const query = searchQuery.toLowerCase();
            const matchedSkills = [], matchedProjects = [], matchedEducation = [];
            allSkillsData.forEach(skill => { const title = currentLang === 'en' ? skill.titleEn : skill.titleSw; const desc = currentLang === 'en' ? skill.descEn : skill.descSw; if(`${title} ${desc} ${skill.achievements} ${skill.searchTerms}`.toLowerCase().includes(query)) matchedSkills.push({ ...skill, title, desc }); });
            allProjectsData.forEach(project => { if(`${project.title} ${project.desc} ${project.searchTerms}`.toLowerCase().includes(query)) matchedProjects.push(project); });
            educationData.forEach(edu => { if(`${edu.title} ${edu.institution || ''} ${edu.year || ''} ${edu.details || ''} ${edu.searchTerms || ''}`.toLowerCase().includes(query)) matchedEducation.push(edu); });
            let html = `<div><h1 class="text-3xl md:text-4xl font-bold text-gray-900 mb-2">🔍 Search Results</h1><p class="text-gray-600 mb-6">Showing results for "<span class="font-semibold text-[#008dc9]">${searchQuery}</span>"</p>`;
            if(matchedSkills.length === 0 && matchedProjects.length === 0 && matchedEducation.length === 0) html += `<div class="text-center py-16"><i class="fa-solid fa-search text-6xl text-gray-300 mb-4"></i><p class="text-gray-500 text-xl">No results found for "${searchQuery}"</p></div>`;
            else {
                if(matchedSkills.length > 0) { html += `<div class="mb-8"><h2 class="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2"><i class="fa-solid fa-laptop-code text-[#008dc9]"></i> Skills (${matchedSkills.length})</h2><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">${matchedSkills.map(skill => `<div onclick='showSkillDetails(${skill.id})' class="skill-card-modern p-5 cursor-pointer"><div class="text-4xl mb-2">${skill.icon}</div><h3 class="text-xl font-bold text-gray-900">${highlightText(skill.title)}</h3><p class="text-gray-600 text-sm mt-1">${highlightText(skill.desc.substring(0, 80))}${skill.desc.length > 80 ? '...' : ''}</p></div>`).join('')}</div></div>`; }
                if(matchedProjects.length > 0) { html += `<div class="mb-8"><h2 class="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2"><i class="fa-solid fa-folder-open text-[#008dc9]"></i> Projects (${matchedProjects.length})</h2><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">${matchedProjects.map((p, idx) => `<div onclick="showProjectModal(${allProjectsData.findIndex(proj => proj.title === p.title)})" class="project-card overflow-hidden cursor-pointer"><img src="${p.img}" class="w-full h-36 object-cover"><div class="p-4"><h3 class="font-bold text-lg text-gray-900">${highlightText(p.title)}</h3><p class="text-gray-600 text-sm">${highlightText(p.desc)}</p></div></div>`).join('')}</div></div>`; }
                if(matchedEducation.length > 0) { html += `<div class="mb-8"><h2 class="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2"><i class="fa-solid fa-graduation-cap text-[#008dc9]"></i> Education (${matchedEducation.length})</h2><div class="space-y-3">${matchedEducation.map(edu => `<div class="bg-white rounded-xl shadow p-4 border-l-4 border-[#008dc9]"><h3 class="font-bold text-gray-900">${highlightText(edu.title)}</h3>${edu.institution ? `<p class="text-sm text-[#008dc9]">${highlightText(edu.institution)} ${edu.year ? '• ' + edu.year : ''}</p>` : ''}${edu.details ? `<p class="text-gray-600 text-sm mt-1">${highlightText(edu.details)}</p>` : ''}</div>`).join('')}</div></div>`; }
            }
            html += `</div>`;
            document.getElementById('main-content').innerHTML = html;
        }
        
        function highlightText(text) { if(!searchQuery || !text) return text; try { const regex = new RegExp(`(${searchQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi'); return text.replace(regex, `<mark class="bg-yellow-300 text-black px-0.5 rounded font-semibold">$1</mark>`); } catch(e) { return text; } }
        
        function renderDashboard() { document.getElementById('main-content').innerHTML = `<div class="rounded-2xl overflow-hidden shadow-xl border border-gray-100"><div class="hero-bg h-[500px] md:h-[600px] relative" style="background-image: url('https://i.postimg.cc/Qxcmqnrd/forex2.jpg?w=1200'); background-size: cover; background-position: center;"><div class="absolute inset-0 bg-gradient-to-r from-black/60 to-transparent"></div><div class="absolute bottom-10 left-6 md:bottom-16 md:left-12 text-white"><h1 class="text-3xl md:text-6xl font-bold">${t('dashboardTitle')}</h1><h2 class="text-4xl md:text-7xl font-bold mt-2">${t('name')}</h2><div class="mt-6 space-y-2 text-base md:text-xl"><div><i class="fa-solid fa-code mr-2"></i>${t('fullstack')}</div><div><i class="fa-solid fa-chart-line mr-2"></i>${t('business')}</div><div><i class="fa-solid fa-pen-nib mr-2"></i>${t('graphics')}</div><div><i class="fa-solid fa-chart-simple mr-2"></i>${t('forex')}</div></div></div></div></div>`; }
        function renderSkillsPage() { let html = `<div><h1 class="text-3xl md:text-5xl font-bold text-gray-900 mb-3">${t('skillsTitle')}</h1><p class="text-gray-800 mb-10">${t('skillsSub')}</p><div class="grid grid-cols-1 md:grid-cols-3 gap-6">${allSkillsData.map(skill => { const title = currentLang === 'en' ? skill.titleEn : skill.titleSw; const desc = currentLang === 'en' ? skill.descEn : skill.descSw; return `<div onclick='showSkillDetails(${skill.id})' class="skill-card-modern p-6"><div class="text-5xl mb-4">${skill.icon}</div><h3 class="text-2xl font-bold text-gray-900">${title}</h3><p class="text-gray-700 mt-2">${desc}</p><div class="mt-4 text-sm text-gray-800 border-t pt-3"><i class="fa-solid fa-circle-info text-[#008dc9]"></i> <span class="font-medium">${t('viewDetails')}</span></div></div>`; }).join('')}</div></div>`; document.getElementById('main-content').innerHTML = html; }
        function renderProjectsPage() { let html = `<div><h1 class="text-3xl md:text-5xl font-bold text-gray-900 mb-4">${t('projectsTitle')}</h1><p class="text-gray-800 mb-8">${t('projectsSub')}</p><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">${allProjectsData.map((p,idx) => `<div onclick="showProjectModal(${idx})" class="project-card overflow-hidden"><img src="${p.img}" class="w-full h-44 object-cover gallery-img cursor-pointer" onclick="event.stopPropagation(); openFullscreen('${p.img}')"><div class="p-5"><h3 class="font-bold text-xl text-gray-900">${p.title}</h3><p class="text-gray-700 mt-1">${p.desc}</p></div></div>`).join('')}</div></div>`; document.getElementById('main-content').innerHTML = html; }
        function renderEducationPage() { document.getElementById('main-content').innerHTML = `<div><h1 class="text-3xl md:text-5xl font-bold text-gray-900 mb-6">${t('educationTitle')}</h1><div class="bg-white rounded-2xl shadow p-6 md:p-8 border-l-8 border-[#008dc9]"><div class="flex gap-5"><div class="text-5xl">🎓</div><div><h3 class="text-2xl font-bold text-gray-900">Bachelor in Business Information Systems</h3><p class="text-[#008dc9] font-medium">UDOM • 2019-2022</p><p class="text-gray-700 mt-2">System Analysis, Web Dev, Database Design</p></div></div></div><div class="mt-6 bg-white rounded-2xl shadow p-6"><h3 class="font-bold text-xl text-gray-900">Certificates</h3><ul class="list-disc list-inside text-gray-800 mt-2"><li>Full Stack Web Development - Moringa</li><li>Forex Trading Advanced</li><li>Graphics Design Masterclass</li></ul></div></div>`; }
        function renderAbout() { document.getElementById('main-content').innerHTML = `<div class="grid md:grid-cols-2 gap-8"><div><img src="https://i.postimg.cc/ZYGjpzX4/me1.jpgF?w=800" class="rounded-2xl shadow-xl w-full object-cover h-96 gallery-img cursor-pointer" onclick="openFullscreen('https://i.postimg.cc/ZYGjpzX4/me1.jpg?w=1200')"></div><div><h1 class="text-3xl md:text-5xl font-bold text-gray-900 mb-4">${t('aboutTitle')}</h1><p class="text-gray-800 text-lg leading-relaxed">Naitwa Jackson Myula, ni Full Stack Developer, Graphics Designer na Forex Trader mwenye shauku kubwa ya teknolojia na biashara. Ninaleta suluhisho za kisasa na ubora kwa wateja wangu kutoka Tanzania.</p><div class="mt-8 flex flex-wrap gap-3"><button onclick="previewCV()" class="bg-[#008dc9] text-white px-5 py-2.5 rounded-xl font-medium hover:bg-[#006b9a] transition"><i class="fa-solid fa-eye"></i> ${t('previewCV')}</button><button onclick="downloadCV()" class="bg-gray-800 text-white px-5 py-2.5 rounded-xl font-medium hover:bg-gray-700 transition"><i class="fa-solid fa-download"></i> ${t('downloadCV')}</button></div><p class="text-sm text-gray-500 mt-4"><i class="fa-regular fa-file-pdf"></i> CV file: jacksoncv.pdf</p></div></div>`; }
        
        function renderContact() { document.getElementById('main-content').innerHTML = `<div><h1 class="text-3xl md:text-5xl font-bold text-gray-900 mb-6">${t('contactTitle')}</h1><div class="space-y-5 text-lg bg-white p-6 rounded-2xl shadow"><div class="flex gap-4 items-center"><i class="fa-solid fa-phone text-3xl text-[#008dc9]"></i><a href="tel:0746526243" class="text-gray-800">0746 526 243</a></div><div class="flex gap-4 items-center"><i class="fa-solid fa-envelope text-3xl text-[#008dc9]"></i><a href="mailto:jacksonmyula773@gmail.com" class="text-gray-800">jacksonmyula773@gmail.com</a></div><a href="https://wa.me/255746526243" target="_blank" class="inline-flex items-center gap-3 bg-[#25D366] text-white px-6 py-3 rounded-xl font-semibold hover:bg-[#128C7E] transition"><i class="fa-brands fa-whatsapp text-2xl"></i> ${t('whatsapp')}</a><a href="sms:0746526243" class="inline-flex items-center gap-3 bg-[#3b82f6] text-white px-6 py-3 rounded-xl font-semibold hover:bg-[#2563eb] transition"><i class="fa-solid fa-envelope text-2xl"></i> ${t('smsMe')}</a></div><div class="mt-8 bg-white rounded-2xl shadow p-6"><h2 class="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2"><i class="fa-solid fa-language text-[#008dc9]"></i> ${t('changeLanguage')}</h2><p class="text-gray-600 mb-4">${t('selectLanguage')}:</p><div class="flex gap-4 flex-wrap"><button onclick="setLanguage('en')" class="lang-setting-btn flex-1 text-center"><i class="fa-solid fa-flag-usa"></i> English</button><button onclick="setLanguage('sw')" class="lang-setting-btn flex-1 text-center"><i class="fa-solid fa-flag"></i> Kiswahili</button></div><p class="text-sm text-gray-500 mt-4"><i class="fa-regular fa-circle-check text-green-500"></i> Current language: <span class="font-semibold">${currentLang === 'en' ? 'English' : 'Kiswahili'}</span></p></div></div>`; }
        
        window.showSkillDetails = function(skillId) { const details = { 1: { titleEn: "Full Stack Development", titleSw: "Maendeleo ya Programu Kamili", fullDesc: t('fullDesc1'), achievements: t('achievements'), images: africanImages.dev }, 2: { titleEn: "Graphics Design", titleSw: "Ubunifu wa Picha", fullDesc: t('fullDesc2'), achievements: t('achievements2'), images: africanImages.graphics }, 3: { titleEn: "Forex Trading", titleSw: "Biashara ya Forex", fullDesc: t('fullDesc3'), achievements: t('achievements3'), images: africanImages.forex } }; const d = details[skillId]; const title = currentLang === 'en' ? d.titleEn : d.titleSw; const imagesHTML = d.images.map(img => `<img src="${img}" class="gallery-img rounded-xl shadow-md w-full h-48 object-cover" onclick="event.stopPropagation(); openFullscreen('${img}')">`).join(''); document.getElementById('modalTitle').innerHTML = title; document.getElementById('modalContent').innerHTML = `<p class="text-gray-800 text-base leading-relaxed mb-5">${d.fullDesc}</p><div class="bg-[#008dc9]/10 p-4 rounded-xl mb-6"><h4 class="font-bold text-[#008dc9] mb-2"><i class="fa-solid fa-trophy"></i> Achievements</h4><p class="text-gray-800">${d.achievements}</p></div><h4 class="font-bold text-xl mb-3">Gallery (${d.images.length} Images - Click to enlarge)</h4><div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">${imagesHTML}</div>`; document.getElementById('modal').classList.remove('hidden'); };
        window.showProjectModal = function(idx) { const p = allProjectsData[idx]; document.getElementById('modalTitle').innerHTML = p.title; document.getElementById('modalContent').innerHTML = `<img src="${p.img}" class="gallery-img w-full rounded-xl mb-5 cursor-pointer" onclick="event.stopPropagation(); openFullscreen('${p.img}')"><p class="text-gray-800 text-lg">${p.detail}</p><p class="text-sm text-gray-500 mt-3"><i class="fa-solid fa-expand"></i> Click image to view fullscreen</p>`; document.getElementById('modal').classList.remove('hidden'); };
        
        function changeSidebarColor(start, end) { 
            document.documentElement.style.setProperty('--sidebar-start', start); 
            document.documentElement.style.setProperty('--sidebar-end', end); 
            localStorage.setItem('sidebarStart', start); 
            localStorage.setItem('sidebarEnd', end); 
            // Force update on mobile as well
            const mobileSidebar = document.getElementById('mobileSidebar');
            const topBar = document.querySelector('.top-bar');
            if(mobileSidebar) mobileSidebar.style.background = `linear-gradient(135deg, ${start}, ${end})`;
            if(topBar) topBar.style.background = `linear-gradient(135deg, ${start}, ${end})`;
        }
        function resetSidebarColor() { changeSidebarColor('#008dc9', '#006b9a'); }
        function loadSavedSidebarColor() { const s = localStorage.getItem('sidebarStart'); const e = localStorage.getItem('sidebarEnd'); if(s && e) changeSidebarColor(s, e); }
        function openSettings() { document.getElementById('settingsModal').classList.remove('hidden'); }
        function closeSettings() { document.getElementById('settingsModal').classList.add('hidden'); }
        function openFullscreen(src) { document.getElementById('fullscreenImage').src = src; document.getElementById('fullscreenViewer').classList.add('active'); document.body.style.overflow = 'hidden'; }
        function closeFullscreen() { document.getElementById('fullscreenViewer').classList.remove('active'); document.body.style.overflow = ''; }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function initDarkMode() { const dark = localStorage.getItem('darkMode') === 'true'; if(dark) document.body.classList.add('dark'); document.getElementById('darkModeToggle')?.addEventListener('click',()=>{ document.body.classList.toggle('dark'); localStorage.setItem('darkMode', document.body.classList.contains('dark')); }); }
        function setupSearch() { document.getElementById('searchInput').addEventListener('input', (e) => { searchQuery = e.target.value.toLowerCase().trim(); performGlobalSearch(); }); }
        
        window.onload = () => { const savedLang = localStorage.getItem('portfolioLang'); if(savedLang === 'sw') currentLang = 'sw'; initSearchData(); renderMenus(); renderDashboard(); initDarkMode(); loadSavedSidebarColor(); setupSearch(); updateSearchPlaceholder(); document.getElementById('langEnBtn').style.opacity = currentLang === 'en' ? '1' : '0.7'; document.getElementById('langSwBtn').style.opacity = currentLang === 'sw' ? '1' : '0.7'; };
        window.openSidebarMobile = openSidebarMobile; window.closeSidebarMobile = closeSidebarMobile; window.navigateTo = navigateTo; window.closeModal = closeModal; window.openSettings = openSettings; window.closeSettings = closeSettings; window.changeSidebarColor = changeSidebarColor; window.resetSidebarColor = resetSidebarColor; window.setLanguage = setLanguage; window.openFullscreen = openFullscreen; window.closeFullscreen = closeFullscreen; window.previewCV = previewCV; window.downloadCV = downloadCV; window.showSkillDetails = showSkillDetails; window.showProjectModal = showProjectModal;
    </script>
